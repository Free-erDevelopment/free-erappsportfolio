<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
:root{
  --bg:#f7f4ff;
  --card:#fdfcff;
  --text:#1a0a2e;
  --muted:#7c3aed;
  --accent:#8b00ff;
  --border:#9333ea;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* Particle canvas sits at z-index 0, behind everything */
#particle-canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:850px;
  margin:auto;
  padding:50px 20px 80px;
}
.profile-card{
  width:min(700px,100%);
  margin:0 auto;
  padding:28px 34px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  position:relative;
  box-shadow:0 0 0 1.5px #9333ea, 0 4px 24px rgba(139,0,255,.10);
}
.name{
  margin:0;
  font-size:42px;
  font-weight:800;
}
.company{
  margin-top:4px;
  color:var(--muted);
  font-size:20px;
}
.email-btn{
  position:absolute;
  top:24px;
  right:28px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:transparent;
  border:1.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  text-decoration:none;
  color:var(--muted);
  transition: background .18s ease, color .18s ease, transform .18s ease, border-color .18s ease;
}
.email-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  transform:scale(1.08);
}
.email-btn svg{
  width:20px;
  height:20px;
  flex-shrink:0;
}
.support{
  text-align:center;
  margin:24px 0 48px;
}
.support a{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 30px;
  border-radius:999px;
  background:#FFD400;
  color:#111;
  text-decoration:none;
  font-weight:800;
  box-shadow:0 4px 18px rgba(255,212,0,.35);
  transition: transform .22s ease, box-shadow .22s ease;
}
.support a:hover{
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 10px 34px rgba(255,212,0,.50);
}
.support a:active{
  transform: translateY(-1px) scale(1.01);
  box-shadow: 0 5px 14px rgba(255,212,0,.28);
}
.coffee-icon{
  width:22px;
  height:22px;
  object-fit:contain;
}
.projects-title{
  text-align:center;
  color:var(--muted);
  letter-spacing:3px;
  font-size:14px;
  font-weight:700;
  margin-bottom:22px;
}
.projects{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.project-card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:20px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  text-decoration:none;
  color:inherit;
  transition:.18s ease;
  box-shadow:0 0 0 1.5px #9333ea, 0 2px 16px rgba(139,0,255,.08);
}
.project-card:hover{
  transform:translateY(-2px);
}
.project-icon{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:16px;
  flex-shrink:0;
}
.project-name{
  font-size:20px;
  font-weight:700;
}
.project-desc{
  color:var(--muted);
  margin-top:3px;
}
.about-title{
  text-align:center;
  color:var(--muted);
  letter-spacing:3px;
  font-size:14px;
  font-weight:700;
  margin-bottom:16px;
}
.about{
  width:min(700px,100%);
  margin:0 auto 48px;
  padding:28px 34px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  box-shadow:0 0 0 1.5px #9333ea, 0 4px 24px rgba(139,0,255,.10);
}
.about-text{
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
  margin:0;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="container">
<div class="profile-card">
  <a class="email-btn" id="emailBtn" href="#" target="_blank" title="Send email">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </svg>
  </a>
  <h1 class="name" id="name"></h1>
  <div class="company" id="company"></div>
</div>
<div class="support">
  <a id="coffeeLink" href="#" target="_blank">
    <img class="coffee-icon" src="./assets/buymeacoffee-logo.png" alt="">
    Support Development
  </a>
</div>
<div class="about-title">ABOUT ME</div>
<div class="about">
  <p class="about-text" id="aboutText"></p>
</div>
<div class="projects-title">PROJECTS</div>
<div class="projects" id="projects"></div>
</div>

<script>
const variables = {
  name: "Cedric",
  company: "Developing @ Free-er Apps",
  email: "freeerapps.dev@gmail.com",
  buyMeACoffeeUrl: "https://buymeacoffee.com/free.erapps",
  about: "I am a high school developer focused on quality productivity software. When my academic workload increased, I relied on basic tools like Google Calendar and Microsoft To-Do to manage my schedule. While reliable, they both lacked half the puzzle. After searching for an app that unified task management and a helpful overview, I made a discovery: the market was split between outdated UIs and overpriced subscription paywalls.\n\nThat's when I decided to try something new; I started building my own solution from scratch. After hours of development around usability and UI structure, I was faced with a challenge where most overcommit: I could try to create a cloud-based account system or continue with local storage, and manage long-term storage creep. To keep the app completely free, I created an analytics system that doesn't rely on buckets of storage to extract trends. Instead, it takes snapshots at midnight and moves on, sacrificing slight inaccuracies rather than an entirely free app.",
  projects: [
    {
      name: "Split Task",
      description: "Productivity app with combined calendar and to-do list pages.",
      icon: "./assets/icon.png",
      link: "#"
    }
  ]
};

document.getElementById("name").textContent = variables.name;
document.getElementById("company").textContent = variables.company;
document.getElementById("coffeeLink").href = variables.buyMeACoffeeUrl;
document.getElementById("aboutText").textContent = variables.about;

const emailBtn = document.getElementById("emailBtn");
emailBtn.href = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(variables.email)}`;

const projects = document.getElementById("projects");
variables.projects.forEach(project => {
  projects.innerHTML += `
    <a class="project-card" href="${project.link}" target="_blank">
      <img class="project-icon" src="${project.icon}" alt="${project.name} icon">
      <div>
        <div class="project-name">${project.name}</div>
        <div class="project-desc">${project.description}</div>
      </div>
    </a>
  `;
});

/* ── Particle System ─────────────────────────────────────── */
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mx = W / 2, my = H / 2;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

// Single vivid purple — one color only
const PARTICLE_COLOR = 'rgba(139, 0, 255,';

class Particle {
  constructor(){
    this.reset();
  }
  reset(){
    this.x  = mx;
    this.y  = my;
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.6 + Math.random() * 2.2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed - 0.6;
    this.life  = 1.0;
    this.decay = 0.022 + Math.random() * 0.030;
    this.size  = 1.5 + Math.random() * 2.5;
    this.glow  = 0.5 + Math.random() * 0.5;
  }
  update(){
    this.x  += this.vx;
    this.y  += this.vy;
    this.vy += 0.06;
    this.vx *= 0.97;
    this.size *= 0.982;
    this.life -= this.decay;
  }
  draw(){
    if(this.life <= 0) return;
    const alpha = Math.max(0, this.life);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3 * this.glow);
    g.addColorStop(0,   PARTICLE_COLOR + (alpha * 0.85) + ')');
    g.addColorStop(0.4, PARTICLE_COLOR + (alpha * 0.30) + ')');
    g.addColorStop(1,   PARTICLE_COLOR + '0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3 * this.glow, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = PARTICLE_COLOR + (alpha * 0.9) + ')';
    ctx.fill();
  }
}

const MAX  = 40;
const pool = [];
for(let i = 0; i < MAX; i++) pool.push(new Particle());
pool.forEach(p => { p.life = Math.random(); });

let spawnAccum = 0;
const SPAWN_RATE = 1; // particles per frame — much calmer

function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);

  // spawn fresh particles at cursor
  spawnAccum += SPAWN_RATE;
  let toSpawn = Math.floor(spawnAccum);
  spawnAccum -= toSpawn;

  let spawned = 0;
  for(let i = 0; i < pool.length && spawned < toSpawn; i++){
    if(pool[i].life <= 0){
      pool[i].reset();
      spawned++;
    }
  }

  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  for(const p of pool){
    p.update();
    p.draw();
  }
  ctx.restore();
}
loop();
</script>
</body>
</html>
