<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
:root{
  --bg:#020408;

  --card:rgba(7,10,18,.78);
  --card-hover:rgba(12,16,25,.92);

  --text:#f8fafc;
  --muted:#c2c8d3;

  --accent:#f3d07b;
  --accent-strong:#ffd66b;

  --border:rgba(255,255,255,.12);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Adds a very subtle ambient glow to the background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% -10%, rgba(243,208,123,.08), transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(255,255,255,.03), transparent 40%);
  pointer-events:none;
  z-index:0;
}

#star-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:850px;
  margin:auto;
  padding:60px 20px 100px;
}

/* Shinier glass cards */
.profile-card,.about,.project-card{
  background:linear-gradient(
    180deg,
    rgba(255,255,255,.07),
    rgba(255,255,255,.01) 60%,
    rgba(0,0,0,.2)
  );
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.2), /* Top glass highlight */
    0 20px 40px rgba(0,0,0,.6);           /* Deeper drop shadow */
}

.profile-card{
  width:min(700px,100%);
  margin:0 auto;
  padding:40px 46px;
  border-radius:16px;
  position:relative;
}

.name{
  margin:0;
  width:fit-content; /* Stops the invisible box from covering the button */
  font-size:40px; 
  font-weight:800;
  letter-spacing:-1px;
  line-height: 1.1; 
  
  /* Gold/White Shimmering Gradient */
  background: linear-gradient(
    to right, 
    #ffffff 0%, 
    #f3d07b 30%, 
    #fff3d4 50%, 
    #f3d07b 70%, 
    #ffffff 100%
  );
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shineText 4s linear infinite;
  filter: drop-shadow(0 0 10px rgba(243,208,123,0.35)); /* Gives it an outer glow */
}

@keyframes shineText {
  to { background-position: 200% center; }
}

.underline {
  width: 140px;
  height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
  margin: 6px 0 16px 0; 
  position: relative;
}

.underline::before {
  content: "";
  position: absolute;
  top: -1px;
  left: 0;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 8px 3px rgba(255,255,255,0.9);
}

.company{
  color:var(--accent);
  font-size:16px;
  letter-spacing:1px;
  text-shadow: 0 0 15px rgba(243,208,123,0.3);
}

.email-btn{
  position:absolute;
  top:36px;
  right:36px;
  z-index: 10; /* Forces the button to sit above everything else */
  width:46px;
  height:46px;
  border-radius:50%;
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent);
  background: rgba(0,0,0,0.4);
  text-decoration:none;
  transition:.25s ease;
  font-size: 18px;
  box-shadow: inset 0 1px 1px rgba(255,255,255,.1);
}

/* Fixes the hover flicker by creating a slightly larger, invisible hover area */
.email-btn::after {
  content: '';
  position: absolute;
  inset: -15px; 
  border-radius: 50%;
}

.email-btn:hover{
  background:var(--accent);
  color:#111;
  transform:scale(1.08);
  box-shadow: 0 0 20px rgba(243,208,123,.4);
}

.support{
  text-align:center;
  margin:30px 0 50px;
}

.support a{
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 32px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  
  background:linear-gradient(
    135deg,
    #f3d07b,
    #ffd66b,
    #fff3d4 
  );
  background-size: 200% 200%;
  color:#111;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.8), 
    0 0 30px rgba(243,208,123,.35);       
  transition: .3s ease;
}

.support a:hover{
  transform:translateY(-2px);
  background-position: 100% 100%;
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.9),
    0 10px 40px rgba(243,208,123,.55);
}

.projects-title,.about-title{
  color:var(--accent);
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 4px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-shadow: 0 0 12px rgba(243,208,123,0.4); 
}

.projects-title::before, .about-title::before,
.projects-title::after, .about-title::after {
  content: "";
  height: 1px;
  width: 40px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
}
.projects-title span, .about-title span {
  position: relative;
}
.projects-title span::before, .about-title span::before,
.projects-title span::after, .about-title span::after {
  content: "•";
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: var(--accent);
  font-size: 8px;
  text-shadow: 0 0 8px var(--accent);
}
.projects-title span::before, .about-title span::before { left: -20px; }
.projects-title span::after, .about-title span::after { right: -20px; }

.about{
  width:min(700px,100%);
  margin:0 auto 48px;
  padding:32px 40px;
  border-radius:16px;
}

.about-text,.project-desc{
  color:var(--muted);
  line-height:1.8;
  font-size: 14px;
  margin: 0 0 16px 0;
}
.about-text:last-child { margin-bottom: 0; }

.projects{
  display:flex;
  flex-direction:column;
  gap:18px;
  width:min(700px,100%);
  margin:0 auto;
}

.project-card{
  display:flex;
  align-items:center;
  gap:24px;
  padding:24px;
  border-radius:16px;
  color:inherit;
  text-decoration:none;
  transition:.3s ease;
  position: relative;
}

.project-card:hover{
  transform:translateY(-4px);
  background:var(--card-hover);
  border-color:var(--accent);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,.2),
    0 15px 40px rgba(0,0,0,.6),
    0 0 20px rgba(243,208,123,.1); 
}

.project-card::after {
  content: "↗";
  position: absolute;
  right: 28px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--accent);
  opacity: 0.8;
  text-shadow: 0 0 10px rgba(243,208,123,0.3);
}

.project-icon{
  width:75px;
  height:75px;
  border-radius:18px;
  object-fit:cover;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.5);
}

.project-name{
  font-size:18px;
  font-weight:600;
  margin-bottom: 6px;
  text-shadow: 0 1px 5px rgba(0,0,0,0.5);
}

</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<div class="container">
  <div class="profile-card">
    <a class="email-btn" id="emailBtn" href="#" target="_blank">✉</a>
    <h1 class="name" id="name"></h1>
    <div class="underline"></div>
    <div class="company" id="company"></div>
  </div>

  <div class="support">
    <a id="coffeeLink" href="#" target="_blank">
      <img src="./assets/buymeacoffee-logo.png" alt="Support" style="width:20px; height:20px;">
      Support Development <span>›</span>
    </a>
  </div>

  <div class="about-title"><span>ABOUT ME</span></div>

  <div class="about" id="aboutContainer">
  </div>

  <div class="projects-title"><span>PROJECTS</span></div>
  <div class="projects" id="projects"></div>

</div>

<script>
const variables = {
  name: "Cedric",
  company: "Developing @ Free-er Apps",
  email: "freeerapps.dev@gmail.com",
  buyMeACoffeeUrl: "https://buymeacoffee.com/free.erapps",
  about: [
    "I am a high school developer focused on quality productivity software. When my academic workload increased, I relied on basic tools like Google Calendar and Microsoft To-Do to manage my schedule. While reliable, they both lacked half the puzzle. After searching for an app that unified task management and a helpful overview, I made a discovery: the market was split between outdated UIs and overpriced subscription paywalls.",
    "That's when I decided to try something new; I started building my own solution from scratch. After hours of development around usability and UI structure, I was faced with a challenge where most overcommit: I could try to create a cloud-based account system or continue with local storage, and manage long-term storage creep. To keep the app completely free, I created an analytics system that doesn't rely on buckets of storage to extract trends. Instead, it takes snapshots at midnight and moves on, sacrificing slight inaccuracies rather than an entirely free app."
  ],
  projects:[{
    name:"Split Task",
    description:"Productivity app with combined calendar and to-do list pages.",
    icon:"./assets/icon-remade512x512.png", 
    link:"#"
  }]
};

document.getElementById("name").textContent = variables.name;
document.getElementById("company").textContent = variables.company;
document.getElementById("coffeeLink").href = variables.buyMeACoffeeUrl;
document.getElementById("emailBtn").href = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(variables.email)}`;

const aboutContainer = document.getElementById("aboutContainer");
variables.about.forEach(paragraph => {
  const p = document.createElement("p");
  p.className = "about-text";
  p.textContent = paragraph;
  aboutContainer.appendChild(p);
});

variables.projects.forEach(project=>{
  const projectsDiv = document.getElementById("projects");
  projectsDiv.innerHTML += `
  <a class="project-card" href="${project.link}" target="_blank">
    <img class="project-icon" src="${project.icon}" alt="">
    <div>
      <div class="project-name">${project.name}</div>
      <div class="project-desc">${project.description}</div>
    </div>
  </a>`;
});

// --- Enhanced Canvas Background ---
(() => {
const canvas=document.getElementById("star-canvas");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
 w=canvas.width=innerWidth;
 h=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=[];
const nodes=[]; 

function createStar(type) {
  let size, speed, baseBrightness;
  
  const isGold = Math.random() > 0.75; 
  const color = isGold ? '255, 214, 107' : '255, 255, 255'; 

  if (type === 'tiny') {
    size = Math.random() * 0.8 + 0.2;
    speed = Math.random() * 0.05 + 0.01;
    baseBrightness = Math.random() * 0.4 + 0.1;
  } else if (type === 'large') {
    size = Math.random() * 1.5 + 1.0;
    speed = Math.random() * 0.02 + 0.005;
    baseBrightness = Math.random() * 0.6 + 0.4;
  } else if (type === 'node') {
    size = Math.random() * 1.0 + 0.5;
    speed = Math.random() * 0.03 + 0.01;
    baseBrightness = Math.random() * 0.5 + 0.3;
  }

  return {
    x: Math.random() * w,
    y: Math.random() * h,
    size: size,
    speed: speed,
    baseBrightness: baseBrightness,
    currentBrightness: baseBrightness,
    type: type,
    isGold: isGold,
    rgb: color,
    isTwinkling: false,
    twinkleTime: 0,
    isShiny: (type === 'large' || type === 'node') && Math.random() > 0.6
  };
}

for(let i=0; i<250; i++) stars.push(createStar('tiny'));
for(let i=0; i<35; i++) stars.push(createStar('large'));

for(let i=0; i<85; i++) {
  let star = createStar('node');
  stars.push(star);
  nodes.push(star);
}

let time = 0;

function frame(){
  requestAnimationFrame(frame);
  time++;

  ctx.clearRect(0,0,w,h);

  // Draw Connecting Lines (Constellations)
  ctx.shadowBlur = 0; 
  for(let i=0; i<nodes.length; i++){
    for(let j=i+1; j<nodes.length; j++){
      const a = nodes[i];
      const b = nodes[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);

      if(dist < 160){
        const opacity = (1-dist/160) * 0.12;
        
        if (a.isGold || b.isGold) {
          ctx.strokeStyle=`rgba(255, 214, 107, ${opacity})`; 
        } else {
          ctx.strokeStyle=`rgba(255, 255, 255, ${opacity})`;
        }
        
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  // Draw Stars
  for(const star of stars){
    star.x += Math.sin(time * star.speed) * 0.03;
    star.y += Math.cos(time * star.speed) * 0.03;

    if(!star.isTwinkling && Math.random() < 0.00015) {
      star.isTwinkling = true;
      star.twinkleTime = 0;
    }

    if(star.isTwinkling) {
      star.twinkleTime++;
      star.currentBrightness = 0.7 + Math.sin(star.twinkleTime * 0.02) * 0.3;
      
      if (star.twinkleTime > Math.PI / 0.02) {
        star.isTwinkling = false;
        star.currentBrightness = star.baseBrightness;
      }
    } else {
      star.currentBrightness = star.baseBrightness;
    }

    // Glowing flares for general large/gold stars
    if (star.type === 'large' || star.isGold) {
      ctx.shadowBlur = star.isGold ? 12 : 8;
      ctx.shadowColor = `rgba(${star.rgb}, ${star.currentBrightness})`;
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = `rgba(${star.rgb}, ${star.currentBrightness})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI*2);
    ctx.fill();

    // The new "Shiny Lens Flare" effect for designated stars
    if (star.isShiny) {
      const flareSize = star.size * 5;
      
      // Horizontal flare
      const gradX = ctx.createLinearGradient(star.x - flareSize, star.y, star.x + flareSize, star.y);
      gradX.addColorStop(0, `rgba(${star.rgb}, 0)`);
      gradX.addColorStop(0.5, `rgba(${star.rgb}, ${star.currentBrightness * 0.8})`);
      gradX.addColorStop(1, `rgba(${star.rgb}, 0)`);
      ctx.fillStyle = gradX;
      ctx.fillRect(star.x - flareSize, star.y - 0.5, flareSize * 2, 1);

      // Vertical flare
      const gradY = ctx.createLinearGradient(star.x, star.y - flareSize, star.x, star.y + flareSize);
      gradY.addColorStop(0, `rgba(${star.rgb}, 0)`);
      gradY.addColorStop(0.5, `rgba(${star.rgb}, ${star.currentBrightness * 0.8})`);
      gradY.addColorStop(1, `rgba(${star.rgb}, 0)`);
      ctx.fillStyle = gradY;
      ctx.fillRect(star.x - 0.5, star.y - flareSize, 1, flareSize * 2);
    }
  }
}

frame();
})();
</script>
</body>
</html>
