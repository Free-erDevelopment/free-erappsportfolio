<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
:root{
  --bg:#f7f4ff;
  --card:#fdfcff;
  --text:#1a0a2e;
  --muted:#20b846;
  --accent:#00ff40;
  --border:#33ea70;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
}

#lava-canvas{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:850px;
  margin:auto;
  padding:50px 20px 80px;
}
.profile-card{
  width:min(700px,100%);
  margin:0 auto;
  padding:28px 34px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  position:relative;
  box-shadow:0 0 0 1.5px #000000, 0 4px 24px rgba(139,0,255,.10);
}
.name{
  margin:0;
  font-size:42px;
  font-weight:800;
}
.company{
  margin-top:4px;
  color:var(--muted);
  font-size:20px;
}
.email-btn{
  position:absolute;
  top:24px;
  right:28px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:transparent;
  border:1.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  text-decoration:none;
  color:var(--muted);
  transition: background .18s ease, color .18s ease, transform .18s ease, border-color .18s ease;
}
.email-btn:hover{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  transform:scale(1.08);
}
.email-btn svg{
  width:20px;
  height:20px;
  flex-shrink:0;
}
.support{
  text-align:center;
  margin:24px 0 48px;
}
.support a{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 30px;
  border-radius:999px;
  background:#FFD400;
  color:#111;
  text-decoration:none;
  font-weight:800;
  box-shadow:0 4px 18px rgba(255,212,0,.35);
  transition: transform .22s ease, box-shadow .22s ease;
}
.support a:hover{
  transform: translateY(-4px) scale(1.04);
  box-shadow: 0 10px 34px rgba(255,212,0,.50);
}
.support a:active{
  transform: translateY(-1px) scale(1.01);
  box-shadow: 0 5px 14px rgba(255,212,0,.28);
}
.coffee-icon{
  width:22px;
  height:22px;
  object-fit:contain;
}
.projects-title{
  text-align:center;
  color:var(--muted);
  letter-spacing:3px;
  font-size:14px;
  font-weight:700;
  margin-bottom:22px;
}
.projects{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.project-card{
  display:flex;
  align-items:center;
  gap:18px;
  padding:20px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  text-decoration:none;
  color:inherit;
  transition:.18s ease;
  box-shadow:0 0 0 1.5px #000000, 0 2px 16px rgba(139,0,255,.08);
}
.project-card:hover{
  transform:translateY(-2px);
}
.project-icon{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:16px;
  flex-shrink:0;
}
.project-name{
  font-size:20px;
  font-weight:700;
}
.project-desc{
  color:var(--muted);
  margin-top:3px;
}
.about-title{
  text-align:center;
  color:var(--muted);
  letter-spacing:3px;
  font-size:14px;
  font-weight:700;
  margin-bottom:16px;
}
.about{
  width:min(700px,100%);
  margin:0 auto 48px;
  padding:28px 34px;
  border-radius:24px;
  border:1.5px solid var(--border);
  background:var(--card);
  box-shadow:0 0 0 1.5px #000000, 0 4px 24px rgba(139,0,255,.10);
}
.about-text{
  color:var(--muted);
  font-size:16px;
  line-height:1.6;
  margin:0;
  white-space:pre-wrap;
}
</style>
</head>
<body>

<canvas id="lava-canvas"></canvas>

<div class="container">
<div class="profile-card">
  <a class="email-btn" id="emailBtn" href="#" target="_blank" title="Send email">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="2,4 12,13 22,4"/>
    </svg>
  </a>
  <h1 class="name" id="name"></h1>
  <div class="company" id="company"></div>
</div>
<div class="support">
  <a id="coffeeLink" href="#" target="_blank">
    <img class="coffee-icon" src="./assets/buymeacoffee-logo.png" alt="">
    Support Development
  </a>
</div>
<div class="about-title">ABOUT ME</div>
<div class="about">
  <p class="about-text" id="aboutText"></p>
</div>
<div class="projects-title">PROJECTS</div>
<div class="projects" id="projects"></div>
</div>

<script>
const variables = {
  name: "Cedric",
  company: "Developing @ Free-er Apps",
  email: "freeerapps.dev@gmail.com",
  buyMeACoffeeUrl: "https://buymeacoffee.com/free.erapps",
  about: "I am a high school developer focused on quality productivity software. When my academic workload increased, I relied on basic tools like Google Calendar and Microsoft To-Do to manage my schedule. While reliable, they both lacked half the puzzle. After searching for an app that unified task management and a helpful overview, I made a discovery: the market was split between outdated UIs and overpriced subscription paywalls.\n\nThat's when I decided to try something new; I started building my own solution from scratch. After hours of development around usability and UI structure, I was faced with a challenge where most overcommit: I could try to create a cloud-based account system or continue with local storage, and manage long-term storage creep. To keep the app completely free, I created an analytics system that doesn't rely on buckets of storage to extract trends. Instead, it takes snapshots at midnight and moves on, sacrificing slight inaccuracies rather than an entirely free app.",
  projects: [
    {
      name: "Split Task",
      description: "Productivity app with combined calendar and to-do list pages.",
      icon: "./assets/icon.png",
      link: "#"
    }
  ]
};

document.getElementById("name").textContent = variables.name;
document.getElementById("company").textContent = variables.company;
document.getElementById("coffeeLink").href = variables.buyMeACoffeeUrl;
document.getElementById("aboutText").textContent = variables.about;

const emailBtn = document.getElementById("emailBtn");
emailBtn.href = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(variables.email)}`;

const projects = document.getElementById("projects");
variables.projects.forEach(project => {
  projects.innerHTML += `
    <a class="project-card" href="${project.link}" target="_blank">
      <img class="project-icon" src="${project.icon}" alt="${project.name} icon">
      <div>
        <div class="project-name">${project.name}</div>
        <div class="project-desc">${project.description}</div>
      </div>
    </a>
  `;
});

/* ── Lava Lamp Background ────────────────────────────────── */
(function () {
  const canvas = document.getElementById('lava-canvas');
  const ctx    = canvas.getContext('2d');
  const off    = document.createElement('canvas');
  const octx   = off.getContext('2d');

  let W, H;
  const RES = 4;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    off.width  = Math.ceil(W / RES);
    off.height = Math.ceil(H / RES);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Blob factory ────────────────────────────────────────
  function makeBlob(x, y, vx, vy, r) {
    return {
      x, y,
      vx, vy,
      r,
      // gentle sinusoidal wobble layered on top of velocity
      wxPhase: Math.random() * Math.PI * 2,
      wyPhase: Math.random() * Math.PI * 2,
      wxFreq:  0.00015 + Math.random() * 0.00015,
      wyFreq:  0.00015 + Math.random() * 0.00015,
      wxAmp:   0.010   + Math.random() * 0.010,
      wyAmp:   0.010   + Math.random() * 0.010,
    };
  }

  // Slower velocities — about half the previous speed
  let blobs = [
    makeBlob(0.20, 0.80, +0.00018, -0.00028, 0.130),
    makeBlob(0.70, 0.75, -0.00020, -0.00022, 0.110),
    makeBlob(0.45, 0.88, +0.00015, -0.00030, 0.140),
    makeBlob(0.15, 0.55, -0.00012, +0.00025, 0.105),
    makeBlob(0.80, 0.60, +0.00025, +0.00018, 0.120),
    makeBlob(0.55, 0.30, -0.00018, +0.00022, 0.110),
    makeBlob(0.35, 0.20, +0.00020, -0.00020, 0.125),
    makeBlob(0.85, 0.40, -0.00015, -0.00025, 0.100),
  ];

  // ── Wall bounce (soft angle deflection) ──────────────────
  const MARGIN = 0.04;
  function softBounce(b) {
    const skew = (Math.random() - 0.5) * 0.0004;
    if (b.x < MARGIN   && b.vx < 0) { b.vx =  Math.abs(b.vx); b.vy += skew; }
    if (b.x > 1-MARGIN && b.vx > 0) { b.vx = -Math.abs(b.vx); b.vy += skew; }
    if (b.y < MARGIN   && b.vy < 0) { b.vy =  Math.abs(b.vy); b.vx += skew; }
    if (b.y > 1-MARGIN && b.vy > 0) { b.vy = -Math.abs(b.vy); b.vx += skew; }
  }

  // ── Attraction / merging logic ───────────────────────────
  // Blobs that are close enough attract each other and move together
  // as a cluster. We use a centre-of-mass pull so they glide into
  // each other and stay merged until natural drift pulls them apart.
  // Critically: we do NOT remove or replace blobs — the metaball
  // field naturally renders overlapping blobs as one unified shape.
  function applyAttraction() {
    const minDist = Math.min(W, H);
    for (let i = 0; i < blobs.length; i++) {
      for (let j = i + 1; j < blobs.length; j++) {
        const a = blobs[i], b = blobs[j];
        const dx = (b.x - a.x) * W;
        const dy = (b.y - a.y) * H;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const combinedR = (a.r + b.r) * minDist;

        // Attraction zone: within ~2.5× combined radii
        if (dist < combinedR * 2.5 && dist > 0.1) {
          // Strength increases as they get closer — pulls them into a group
          const strength = 0.000008 * (1 - dist / (combinedR * 2.5));
          const nx = dx / dist, ny = dy / dist;
          a.vx += nx * strength;
          a.vy += ny * strength;
          b.vx -= nx * strength;
          b.vy -= ny * strength;
        }

        // Once deeply overlapping, velocity-align so they move as one
        if (dist < combinedR * 0.6) {
          const blend = 0.018;
          const avgVx = (a.vx + b.vx) * 0.5;
          const avgVy = (a.vy + b.vy) * 0.5;
          a.vx += (avgVx - a.vx) * blend;
          a.vy += (avgVy - a.vy) * blend;
          b.vx += (avgVx - b.vx) * blend;
          b.vy += (avgVy - b.vy) * blend;
        }
      }
    }
  }

  // Speed cap so blobs never get flung around
  const MAX_SPEED = 0.00040;
  function capSpeed(b) {
    const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (spd > MAX_SPEED) {
      b.vx = (b.vx / spd) * MAX_SPEED;
      b.vy = (b.vy / spd) * MAX_SPEED;
    }
  }

  // ── Metaball render ──────────────────────────────────────
  const THRESHOLD = 1.0;
  const CR = 255, CG = 90, CB = 15;

  let t = 0;

  function drawLava() {
    const ow = off.width, oh = off.height;
    const imgData = octx.createImageData(ow, oh);
    const data    = imgData.data;

    const bw = blobs.map(b => ({
      cx: b.x * W,
      cy: b.y * H,
      r2: (b.r * Math.min(W, H)) ** 2,
    }));

    for (let py = 0; py < oh; py++) {
      for (let px = 0; px < ow; px++) {
        const wx = (px + 0.5) * RES;
        const wy = (py + 0.5) * RES;
        let field = 0;
        for (let i = 0; i < bw.length; i++) {
          const dx = wx - bw[i].cx;
          const dy = wy - bw[i].cy;
          field += bw[i].r2 / (dx * dx + dy * dy + 1);
        }
        if (field > THRESHOLD) {
          const idx    = (py * ow + px) * 4;
          const excess = Math.min((field - THRESHOLD) * 3.5, 1.0);
          data[idx]     = CR;
          data[idx + 1] = CG;
          data[idx + 2] = CB;
          data[idx + 3] = Math.round(150 * excess);
        }
      }
    }
    octx.putImageData(imgData, 0, 0);
  }

  function loop() {
    requestAnimationFrame(loop);

    applyAttraction();

    for (const b of blobs) {
      b.x += b.vx + Math.sin(t * b.wxFreq + b.wxPhase) * b.wxAmp * 0.008;
      b.y += b.vy + Math.sin(t * b.wyFreq + b.wyPhase) * b.wyAmp * 0.008;
      softBounce(b);
      capSpeed(b);
    }

    ctx.clearRect(0, 0, W, H);
    drawLava();
    ctx.drawImage(off, 0, 0, W, H);
    t++;
  }

  loop();
})();
</script>
</body>
</html>
